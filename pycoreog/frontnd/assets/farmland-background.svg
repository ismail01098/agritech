<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#98FB98;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sunGradient" cx="50%" cy="20%" r="30%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:0.5" />
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="100%" height="70%" fill="url(#skyGradient)" />
  <!-- Sun -->
  <circle cx="80%" cy="15%" r="80" fill="url(#sunGradient)" />
  <!-- Clouds -->
  <ellipse cx="20%" cy="20%" rx="100" ry="40" fill="#FFFFFF" opacity="0.8" />
  <ellipse cx="25%" cy="18%" rx="80" ry="30" fill="#FFFFFF" opacity="0.8" />
  <ellipse cx="60%" cy="25%" rx="120" ry="50" fill="#FFFFFF" opacity="0.8" />
  <ellipse cx="65%" cy="23%" rx="90" ry="35" fill="#FFFFFF" opacity="0.8" />
  <!-- Fields -->
  <rect x="0" y="70%" width="100%" height="30%" fill="#8FBC8F" />
  <!-- Crops -->
  <rect x="10%" y="75%" width="5%" height="20%" fill="#228B22" />
  <rect x="20%" y="75%" width="5%" height="20%" fill="#228B22" />
  <rect x="30%" y="75%" width="5%" height="20%" fill="#228B22" />
  <rect x="40%" y="75%" width="5%" height="20%" fill="#228B22" />
  <rect x="50%" y="75%" width="5%" height="20%" fill="#228B22" />
  <rect x="60%" y="75%" width="5%" height="20%" fill="#228B22" />
  <rect x="70%" y="75%" width="5%" height="20%" fill="#228B22" />
  <rect x="80%" y="75%" width="5%" height="20%" fill="#228B22" />
  <!-- Tractor -->
  <rect x="15%" y="85%" width="8%" height="5%" fill="#8B4513" />
  <circle cx="17%" cy="92%" r="2%" fill="#000000" />
  <circle cx="21%" cy="92%" r="2%" fill="#000000" />
  <!-- Farmer -->
  <circle cx="85%" cy="80%" r="3%" fill="#FDBCB4" />
  <rect x="83%" y="83%" width="4%" height="7%" fill="#000080" />
  <rect x="84%" y="90%" width="2%" height="5%" fill="#8B4513" />
  <!-- Text -->
  <text x="50%" y="50%" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" fill="#FFFFFF" opacity="0.7">PyCore</text>
</svg>